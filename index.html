<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Explorer — Milestone 1 Desktop Review</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f7f9;--white:#fff;--border:#e2e5eb;--border2:#d0d4dc;--t1:#1a1d24;--t2:#4a5060;--t3:#8590a2;--amber:#c47a12;--amber-bg:#fef6e8;--amber-bdr:#f5d68a;--blue:#2563a8;--blue-bg:#eef4fb;--blue-bdr:#a3c5e8;--purple:#6d4ba0;--purple-bg:#f3eefb;--purple-bdr:#c4ace8;--green:#2d7a4a;--green-bg:#ecf7f0;--green-bdr:#95d6a8;--gray:#5a6270;--gray-bg:#f0f1f3;--gray-bdr:#c8ccd4;--brown:#8a6050;--brown-bg:#f7f0ed;--brown-bdr:#d4b8aa;--red-bg:#fef0ee;--red-bdr:#f5b8ae;--red:#b84030}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.55;zoom:1.12}
.page{max-width:1140px;margin:0 auto;padding:28px 24px}
.header{margin-bottom:18px}.header h1{font-size:26px;font-weight:700;letter-spacing:-.3px}.header p{font-size:14px;color:var(--t2);margin-top:3px}

/* Overview strip */

.search-section{margin-bottom:16px}.search-title{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:10px}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:11px 18px;border:none;background:0;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t1)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search-box{flex:1;min-width:280px;position:relative}
.search-box input{width:100%;padding:14px 16px 14px 42px;background:var(--white);border:2px solid var(--blue-bdr);border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:border .2s,box-shadow .2s;color:var(--t1)}
.search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,168,0.12)}
.search-box input::placeholder{color:var(--t3)}.search-box .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:18px}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;user-select:none}.chip.off{opacity:.3}
.count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--t3)}
.search-info{background:var(--blue-bg);border:1px solid var(--blue-bdr);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--blue);display:none}.search-info.visible{display:block}
.intro{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.6}
.jd-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s,box-shadow .15s;margin-bottom:8px}
.jd-card:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.04)}.jd-card.search-hit{border-color:var(--blue-bdr)}
.jd-header{padding:14px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;user-select:none}.jd-header:hover{background:var(--bg)}
.sector-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px}
.jd-info{flex:1;min-width:0}.jd-role{font-size:16px;font-weight:700}.jd-company{font-size:14px;color:var(--t2);margin-top:1px}
.jd-meta{font-size:13px;color:var(--t3);margin-top:3px;display:flex;gap:12px;flex-wrap:wrap}
.jd-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sector-tag{padding:3px 10px;border-radius:6px;font-size:13px;font-weight:600;white-space:nowrap}
.arrow{color:var(--t3);font-size:18px;transition:transform .2s;line-height:1}.jd-card.open .arrow{transform:rotate(90deg)}
.flag-tag{padding:2px 8px;border-radius:5px;font-size:12px;font-weight:600;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr)}
.hit-count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:4px}
.jd-body{display:none;padding:0 18px 18px 36px}.jd-card.open .jd-body{display:block}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}.section-label:first-child{margin-top:0}
.resp-item{font-size:14px;color:var(--t1);padding:6px 0 6px 12px;border-left:2px solid var(--border);margin-bottom:4px;line-height:1.55}
.qual-item{font-size:14px;color:var(--t2);padding:4px 0 4px 12px;border-left:2px solid var(--amber-bdr);margin-bottom:3px;line-height:1.5}
.summary-note{font-size:13px;color:var(--t3);font-style:italic;margin-bottom:10px;padding:6px 10px;background:#f9fafb;border-radius:6px;border:1px dashed var(--border)}
.raw-btn{font-size:13px;color:var(--blue);cursor:pointer;margin-top:12px;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;background:var(--blue-bg);border:1px solid var(--blue-bdr);transition:all .15s}.raw-btn:hover{background:#dde9f5}
.raw-text{display:none;font-size:13px;color:var(--t2);line-height:1.65;white-space:pre-wrap;margin-top:8px;padding:12px;background:var(--bg);border-radius:8px;max-height:400px;overflow-y:auto;border:1px solid var(--border)}.raw-text.visible{display:block}
.hl{background:#fef08a;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:40px;color:var(--t3)}
.sector-col{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;overflow:hidden}
.sector-col h3{font-size:14px;font-weight:700;margin-bottom:2px}.sector-col .sub{font-size:13px;color:var(--t2);margin-bottom:12px}
.resp-list-item{font-size:12px;color:var(--t1);padding:5px 0 5px 10px;border-left:2px solid var(--border);margin-bottom:3px;line-height:1.5}
.qual-list-item{font-size:12px;color:var(--t2);padding:4px 0 4px 10px;border-left:2px solid var(--amber-bdr);margin-bottom:2px;line-height:1.45}
.type-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}.type-card h3{font-size:16px;font-weight:700;margin-bottom:4px}
.card-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}.card-box h3{font-size:15px;font-weight:700;margin-bottom:4px}.card-box .sub{font-size:12px;color:var(--t2);margin-bottom:14px}
.ev-row{display:flex;align-items:center;gap:8px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-radius:6px;margin:0 -8px}
.ev-row:hover{background:var(--blue-bg)}.ev-row.open{background:#f0f4f9}
.ev-label{flex:1;font-size:13px;font-weight:600}
.ev-bar{width:140px;flex-shrink:0;display:flex;align-items:center;gap:6px}
.ev-bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.ev-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.ev-count{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--t3);width:45px;text-align:right;flex-shrink:0}
.ev-arrow{color:var(--t3);font-size:14px;transition:transform .2s;flex-shrink:0;width:16px;text-align:center}.ev-row.open .ev-arrow{transform:rotate(90deg)}
.ev-panel{display:none;padding:8px 12px;margin:0 0 8px;background:#f8f9fb;border-radius:8px;border:1px solid var(--border)}.ev-panel.open{display:block}
.ev-jd{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}.ev-jd:last-child{border-bottom:none}
.ev-jd-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ev-jd-name{font-weight:700;font-size:12px}
.ev-jd-text{font-size:13px;color:var(--t2);line-height:1.55;padding-left:10px;border-left:2px solid var(--blue-bdr);margin-top:3px}
.ev-jd-text .hl{background:#fef08a}
.ev-src{font-size:12px;color:var(--t3);font-style:italic;padding-left:10px}
.ev-dots{display:flex;gap:2px;flex-shrink:0}.ev-dot{width:8px;height:8px;border-radius:2px}
.hm-wrap{overflow-x:auto;margin-top:8px}
.hm-table{border-collapse:collapse;width:100%}
.hm-table th{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding:6px 4px;text-align:center;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--white);z-index:2}
.hm-table th:first-child{text-align:left;min-width:220px;padding-left:8px}
.hm-table td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);font-size:14px;min-width:48px}
.hm-table td:first-child{text-align:left;padding-left:8px;white-space:nowrap}
.hm-table tr:hover td{background:#fafbfc}
.hm-yes{background:#ecf7f0;color:var(--green);font-weight:700;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;width:34px;height:30px;font-size:16px}.hm-no{color:var(--border);font-size:10px}
.hm-footer td{font-weight:700;border-top:2px solid var(--border);background:#fafbfc;font-family:"JetBrains Mono",monospace;font-size:14px}
.exp-table{width:100%;border-collapse:collapse}
.exp-table th{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding:8px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--white);z-index:2}
.exp-table td{padding:8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.exp-table tr:hover td{background:#fafbfc}
.tab-content{display:none}.tab-content.active{display:block}
.csv-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:var(--white);border:1.5px solid var(--border);color:var(--t2);font-family:inherit;transition:all .15s;margin-left:auto}
.csv-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}

/* Gaps tab */
.gap-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.gap-card:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.gap-card.open{border-color:var(--red-bdr)}
.gap-head{display:flex;align-items:center;gap:10px}
.gap-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.gap-info{flex:1}.gap-title{font-size:14px;font-weight:700}.gap-sub{font-size:13px;color:var(--t3);margin-top:1px}
.gap-badge{padding:3px 10px;border-radius:6px;font-size:13px;font-weight:700;font-family:"JetBrains Mono",monospace}
.gap-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.gap-card.open .gap-body{display:block}
.gap-leg{font-size:12px;color:var(--t2);padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber-bdr);border-radius:8px;margin-bottom:10px;line-height:1.5}
.gap-note{font-size:12px;color:var(--t1);line-height:1.6;margin-bottom:10px}
@media(max-width:900px){.ev-bar{width:100px}}
</style>
</head>
<body>
<div class="page">
  <div class="header"><h1>Job Description Explorer</h1><p>Milestone 1 Desktop Review — QLD Mining Supervisor Competency Requirements</p></div>
  <div class="tabs" id="tabBar">
    <button class="tab on" data-t="browse">All JDs</button>
    <button class="tab" data-t="sectors">By Sector</button>
    <button class="tab" data-t="types">Supervisor Types</button>
    <button class="tab" data-t="quals">Qualifications</button>
    <button class="tab" data-t="duties">Common Duties</button>
    <button class="tab" data-t="experience">Experience</button>
    <button class="tab" data-t="gaps" style="color:var(--red)">Gaps</button>
  </div>
  <div id="browseTab" class="tab-content active"></div>
  <div id="sectorsTab" class="tab-content"></div>
  <div id="typesTab" class="tab-content"></div>
  <div id="qualsTab" class="tab-content"></div>
  <div id="dutiesTab" class="tab-content"></div>
  <div id="experienceTab" class="tab-content"></div>
  <div id="gapsTab" class="tab-content"></div>
</div>
<div id="loadingOverlay" style="position:fixed;inset:0;background:white;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
<div style="width:40px;height:40px;border:4px solid #e2e5ea;border-top-color:#2563a8;border-radius:50%;animation:spin .8s linear infinite"></div>
<div style="color:#5a6270;font-size:14px">Loading job descriptions...</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>

const EXPERIENCE_DATA=[
  {id:1,mining:"5+ years (open-cut coal)",supervisory:"2+ years (open-cut coal)",trade:"Not required",other:"S1,2,3 and G2"},

let S={tab:"browse",search:"",sectors:new Set(Object.keys(SECTORS)),open:new Set(),rawOpen:new Set(),evOpen:new Set(),gapOpen:new Set()};
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function hi(t,q){if(!q||!t)return esc(t);return esc(t).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi"),'<span class="hl">$1</span>')}
function hiTerms(text,terms){let h=esc(text);terms.forEach(t=>{const tt=t.trim();if(tt.length>1)h=h.replace(new RegExp(`(${tt.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi"),'<span class="hl">$1</span>')});return h}
function countHits(t,q){if(!q)return 0;return(t.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"))||[]).length}
function getRaw(j){return RAW_TEXTS[j.source]||RAW_TEXTS[j.source.replace('.pdf','.docx')]||""}
function getClean(j){return CLEAN_TEXTS[j.source]||CLEAN_TEXTS[j.source.replace('.pdf','.docx')]||[]}
function sc(s){return SECTORS[s]||{color:"#5a6270",bg:"#f0f1f3",bdr:"#c8ccd4"}}
function inScope(j){return !j.flag}

function findEvidence(j,terms,max){max=max||5;const lines=getClean(j);const m=[];for(const l of lines){if(terms.some(t=>l.toLowerCase().includes(t.trim()))&&m.length<max&&!m.includes(l))m.push(l)}if(!m.length){const rl=getRaw(j).split("\n");for(const l of rl){if(terms.some(t=>l.toLowerCase().includes(t.trim()))&&m.length<max){const cl=l.trim();if(cl.length>5&&!m.includes(cl))m.push(cl)}}}return m}
function jdMatches(j,terms){const t=getRaw(j).toLowerCase();return terms.some(term=>t.includes(term.trim()))}

// CSV export helper
function downloadCSV(filename, headers, rows) {
  const csvContent = [headers.join(","), ...rows.map(r=>r.map(c=>'"'+(c||"").replace(/"/g,'""')+'"').join(","))].join("\n");
  const blob = new Blob([csvContent], {type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

  return `<div><div class="ev-row ${isOpen?"open":""}" data-ev="${esc(key)}">

    </div><div class="ev-panel ${isOpen?"open":""}">
      ${matchingJDs.map((j,i)=>{const c=sc(j.sector);const lines=allEvidence[i]||[];

function renderGaps(){
  const el=document.getElementById("gapsTab");const scope=DATA.filter(inScope);
  const gapResults=GAPS.map(g=>{
    const matches=[];const evidence=[];
    scope.forEach(j=>{if(jdMatches(j,g.terms)){matches.push(j);evidence.push(findEvidence(j,g.terms,3))}});
    return {...g,matches,evidence,count:matches.length};
  }).sort((a,b)=>a.count-b.count);

  el.innerHTML=`<p class="intro">Areas required by Queensland mining legislation or identified in reviews (Brady Review, Safety Reporting Survey) that are <strong>under-represented or absent</strong> in the ${scope.length} in-scope job descriptions. These gaps are key inputs for the training needs analysis and interview questions.</p>
  ${gapResults.map(g=>{
    const pct=Math.round(g.count/scope.length*100);
    const severity=g.count===0?"#b84030":g.count<=2?"#c47a12":"#2d7a4a";
    const severityBg=g.count===0?"var(--red-bg)":g.count<=2?"var(--amber-bg)":"var(--green-bg)";
    const severityBdr=g.count===0?"var(--red-bdr)":g.count<=2?"var(--amber-bdr)":"var(--green-bdr)";
    const severityLabel=g.count===0?"Not found":g.count<=2?"Rarely mentioned":"Some coverage";
    const isOpen=S.gapOpen.has(g.area);
    return `<div class="gap-card ${isOpen?"open":""}" data-gap="${esc(g.area)}">
      <div class="gap-head">
        <div class="gap-icon" style="background:${severityBg};color:${severity};border:1px solid ${severityBdr}">${g.count===0?"\u2716":g.count<=2?"\u26a0":"\u2714"}</div>
        <div class="gap-info"><div class="gap-title">${esc(g.area)}</div><div class="gap-sub">${severityLabel} \u2014 ${g.count} of ${scope.length} JDs (${pct}%)</div></div>
        <div class="gap-badge" style="color:${severity};background:${severityBg};border:1px solid ${severityBdr}">${g.count}/${scope.length}</div>
        <span class="arrow" style="${isOpen?"transform:rotate(90deg)":""}">\u203a</span>
      </div>
      <div class="gap-body">
        <div class="gap-leg"><strong>Legislative basis:</strong> ${esc(g.legislative)}</div>
        <div class="gap-note">${esc(g.note)}</div>
        ${g.count>0?`<div style="font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px">JDs that mention this (${g.count}):</div>
          ${g.matches.map((j,i)=>{const c=sc(j.sector);const lines=g.evidence[i]||[];
            return `<div class="ev-jd"><div class="ev-jd-header"><div style="width:3px;height:16px;border-radius:2px;background:${c.color}"></div>
              <span class="ev-jd-name">${esc(j.company)}</span><span style="font-size:10px;color:var(--t3)">\u2014 ${esc(j.role)}</span>
              <span class="sector-tag" style="color:${c.color};background:${c.bg};border:1px solid ${c.bdr};font-size:9px;padding:1px 6px">${esc(j.sector)}</span></div>
            ${lines.map(l=>`<div class="ev-jd-text">${hiTerms(l,g.terms)}</div>`).join("")}</div>`}).join("")}`
        :`<div style="font-size:12px;color:var(--red);font-style:italic">No JDs in the dataset mention this area. This is a potential training gap to explore in supervisor interviews.</div>`}
      </div>
    </div>`;
  }).join("")}
  <div class="card-box" style="margin-top:16px;border-color:var(--amber-bdr);background:var(--amber-bg)"><h3 style="color:var(--amber)">How to use this tab</h3>
  <div style="font-size:13px;color:var(--t2);line-height:1.7">
    <p>These gaps highlight areas where legislation or reviews expect supervisor competency, but job descriptions don't reflect it. This doesn't mean supervisors aren't doing these tasks — it means the JDs don't capture them. Use these gaps to:</p>
    <p style="margin-top:6px"><strong>1.</strong> Shape interview questions for Milestone 1 qualitative interviews</p>
    <p><strong>2.</strong> Identify where training needs may exist but aren't being recruited for</p>
    <p><strong>3.</strong> Compare against AUSMASA and FSO unit development (Milestone 3)</p>
  </div></div>`;
  el.querySelectorAll(".gap-card").forEach(card=>{
    card.querySelector(".gap-head").onclick=()=>{const a=card.dataset.gap;S.gapOpen.has(a)?S.gapOpen.delete(a):S.gapOpen.add(a);render()};
  });
}

function render(){
  ({browse:renderBrowse,sectors:renderSectors,types:renderTypes,quals:renderQuals,duties:renderDuties,experience:renderExperience,gaps:renderGaps})[S.tab]();
}

// Load data and initialize
fetch('data.json').then(r=>r.json()).then(d=>{
  RAW_TEXTS = d.raw_texts || {};
  CLEAN_TEXTS = d.clean_texts || {};
  DATA = d.data || [];
  GAPS = d.gaps || [];
  document.getElementById('loadingOverlay').remove();
  render();
}).catch(e=>{
  document.getElementById('loadingOverlay').innerHTML=
    '<div style="color:#c44;text-align:center"><h2>Failed to load data</h2><p>'+e.message+'</p><p style="color:#888;font-size:13px">Ensure data.json is in the same directory as index.html</p></div>';
});
</script></body></html>
